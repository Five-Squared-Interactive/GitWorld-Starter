<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: rgba(20, 20, 30, 0.92);
    color: #e0e0e0;
    padding: 16px;
    overflow: hidden;
  }
  h1 {
    font-size: 18px;
    color: #FFD700;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255, 215, 0, 0.3);
    padding-bottom: 6px;
  }
  .subtitle {
    font-size: 11px;
    color: #999;
    margin-bottom: 14px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .info-label { color: #888; }
  .info-value { color: #ccc; }
  .status {
    margin-top: 12px;
    padding: 8px;
    background: rgba(255, 215, 0, 0.08);
    border-left: 3px solid #FFD700;
    border-radius: 3px;
    font-size: 11px;
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4CAF50;
    margin-right: 6px;
    vertical-align: middle;
  }
  .controls {
    margin-top: 12px;
    font-size: 11px;
    color: #888;
    line-height: 1.6;
  }
  .key {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 10px;
  }
  .cta {
    margin-top: 14px;
    text-align: center;
  }
  .cta a {
    color: #FFD700;
    font-size: 11px;
    text-decoration: none;
    border: 1px solid rgba(255, 215, 0, 0.4);
    padding: 6px 14px;
    border-radius: 4px;
    display: inline-block;
    transition: background 0.2s;
  }
  .cta a:hover {
    background: rgba(255, 215, 0, 0.15);
  }
  .close-btn {
    position: absolute;
    top: 8px; right: 10px;
    background: none; border: none;
    color: #666; font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .close-btn:hover { color: #ccc; }
</style>
</head>
<body>
  <button class="close-btn" id="close-btn">&times;</button>
  <h1 id="world-title">The Overlook</h1>
  <div class="subtitle">A Git World Template</div>

  <div class="info-row">
    <span class="info-label">Type</span>
    <span class="info-value">Declarative VEML</span>
  </div>
  <div class="info-row">
    <span class="info-label">Multiplayer</span>
    <span class="info-value" id="mp-status">Disabled</span>
  </div>

  <div class="status">
    <span class="status-dot" id="bridge-dot"></span>
    <span id="bridge-label">Connecting...</span>
  </div>

  <div class="controls">
    <strong>Controls</strong><br>
    <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move &nbsp;
    <span class="key">Mouse</span> Look<br>
    <span class="key">Q</span> Up &nbsp;
    <span class="key">Z</span> Down &nbsp;
    <span class="key">Space</span> Jump
  </div>

  <div class="cta">
    <a href="https://github.com/Five-Squared-Interactive/GitWorld-Starter" target="_blank">Fork This World</a>
  </div>

<script>
  var bridgeDot = document.getElementById('bridge-dot');
  var bridgeLabel = document.getElementById('bridge-label');
  var closeBtn = document.getElementById('close-btn');

  function sendToWorld(data) {
    var msg = JSON.stringify(data);
    if (window.vuplex) {
      window.vuplex.postMessage(msg);
    } else if (window.parent !== window) {
      window.parent.postMessage({ type: 'vuplex.postMessage', message: msg }, '*');
    }
  }

  function onBridgeReady() {
    bridgeDot.style.background = '#4CAF50';
    bridgeLabel.textContent = 'Bridge connected';
    sendToWorld({ type: 'panel-ready' });
  }

  // Listen for messages from the world engine
  function handleWorldMessage(event) {
    try {
      var data = (typeof event.data === 'string') ? JSON.parse(event.data) : event.data;
      if (data.type === 'world-info') {
        document.getElementById('world-title').textContent = data.title || 'Untitled';
      }
    } catch (e) {
      // ignore non-JSON
    }
  }

  // Set up Vuplex bridge
  if (window.vuplex) {
    onBridgeReady();
    window.vuplex.addEventListener('message', handleWorldMessage);
  } else {
    window.addEventListener('vuplexready', function() {
      onBridgeReady();
      window.vuplex.addEventListener('message', handleWorldMessage);
    });
    // WebGL polyfill path
    window.addEventListener('message', handleWorldMessage);
    // If no vuplex after 2s, mark as standalone
    setTimeout(function() {
      if (!window.vuplex) {
        bridgeDot.style.background = '#FF9800';
        bridgeLabel.textContent = 'Standalone mode';
      }
    }, 2000);
  }

  closeBtn.addEventListener('click', function() {
    sendToWorld({ type: 'close-panel' });
  });
</script>
</body>
</html>
