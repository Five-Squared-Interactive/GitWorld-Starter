<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading World...</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
  #unity-container { width: 100%; height: 100%; position: absolute; }
  #unity-canvas { width: 100%; height: 100%; background: #111; }
  #loading-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #111; color: #ccc; font-family: sans-serif; z-index: 10;
  }
  #loading-overlay h1 { font-size: 24px; color: #FFD700; margin-bottom: 20px; }
  #progress-bar-bg {
    width: 300px; height: 6px; background: #333; border-radius: 3px; overflow: hidden;
  }
  #progress-bar {
    width: 0%; height: 100%; background: #FFD700; border-radius: 3px;
    transition: width 0.3s;
  }
  #loading-status { margin-top: 12px; font-size: 13px; color: #888; }
</style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <div id="loading-overlay">
    <h1>The Overlook</h1>
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="loading-status">Initializing...</div>
  </div>

<script>
  var buildUrl = "runtime/Build";
  var loaderUrl = buildUrl + "/WebGL-Compressed.loader.js";
  var config = {
    dataUrl:       buildUrl + "/WebGL-Compressed.data.gz",
    frameworkUrl:   buildUrl + "/WebGL-Compressed.framework.js.gz",
    codeUrl:       buildUrl + "/WebGL-Compressed.wasm.gz",
    streamingAssetsUrl: "runtime/StreamingAssets",
    companyName:   "Git World",
    productName:   "The Overlook",
    productVersion: "1.0"
  };

  var overlay = document.getElementById("loading-overlay");
  var progressBar = document.getElementById("progress-bar");
  var loadingStatus = document.getElementById("loading-status");

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = function () {
    loadingStatus.textContent = "Loading runtime...";
    createUnityInstance(document.getElementById("unity-canvas"), config, function (progress) {
      progressBar.style.width = (progress * 100) + "%";
      if (progress < 0.5) {
        loadingStatus.textContent = "Downloading assets...";
      } else if (progress < 0.9) {
        loadingStatus.textContent = "Compiling...";
      } else {
        loadingStatus.textContent = "Starting world...";
      }
    }).then(function (instance) {
      overlay.style.display = "none";
      // Tell the runtime to load our world.veml
      var worldUrl = window.location.origin + window.location.pathname.replace(/\/index\.html$/, "") + "/world.veml";
      // WebVerse reads the URL from the query string or loads the default
    }).catch(function (message) {
      loadingStatus.textContent = "Error: " + message;
      loadingStatus.style.color = "#f44";
    });
  };
  script.onerror = function () {
    loadingStatus.textContent = "Failed to load runtime. Make sure the deploy workflow has run.";
    loadingStatus.style.color = "#f44";
  };
  document.body.appendChild(script);
</script>
</body>
</html>
